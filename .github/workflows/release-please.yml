name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v7
        if: ${{ steps.release.outputs.release_created }}
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ steps.release.outputs.release_created }}
      - name: Install system dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libpipewire-0.3-dev clang
      - name: Build .deb
        if: ${{ steps.release.outputs.release_created }}
        run: cargo install cargo-deb && cargo deb
      - name: Attach .deb to release
        if: ${{ steps.release.outputs.release_created }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} target/debian/*.deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
